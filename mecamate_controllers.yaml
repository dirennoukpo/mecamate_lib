# ─────────────────────────────────────────────────────────────────────────────
#  mecamate_controllers.yaml
#  Paramètres des controllers ros2_control pour Mecamate
# ─────────────────────────────────────────────────────────────────────────────

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz — doit correspondre à publish_rate du node

    # ── Controllers chargés au démarrage ─────────────────────────────────────
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

    # Si tu veux contrôler le bras 6-DOF :
    # arm_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

# ─────────────────────────────────────────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters:
    joints:
      - wheel_fl_joint
      - wheel_fr_joint
      - wheel_rl_joint
      - wheel_rr_joint

# ─────────────────────────────────────────────────────────────────────────────
mecanum_drive_controller:
  ros__parameters:
    # Topics I/O
    reference_topic:      "cmd_vel"
    odom_topic:           "odom"
    tf_frame_prefix_enable: false

    # Joints — ordre FL, FR, RL, RR impératif pour la cinématique
    front_left_wheel_name:  wheel_fl_joint
    front_right_wheel_name: wheel_fr_joint
    rear_left_wheel_name:   wheel_rl_joint
    rear_right_wheel_name:  wheel_rr_joint

    # Géométrie (mètres)
    wheel_radius:           0.045
    wheel_separation_x:     0.28   # empattement avant-arrière
    wheel_separation_y:     0.24   # voie gauche-droite

    # Limites de vitesse
    linear.x.max_velocity:  0.5   # m/s
    linear.y.max_velocity:  0.5
    angular.z.max_velocity: 2.0   # rad/s

    # Odométrie
    pose_covariance_diagonal:  [0.01, 0.01, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.001]

    open_loop:       false
    enable_odom_tf:  true
    odom_frame_id:   odom
    base_frame_id:   base_link

